<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivial — Events</title>
<link rel="icon" type="image/png" href="images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/shared.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/pages/eventos.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-logo" href="trivial-intro.html">
      <img class="logo-main" src="images/logo.png" alt="Trivial Travel">
      <img class="logo-eu"   src="images/eu-logo.png" alt="Co-funded by EU">
    </a>
    <ul class="navbar-links">
      <li><a href="trivial-modos.html">Home &amp; Network</a></li>
      <li><a href="trivial-ranking.html">Ranking</a></li>
      <li><a href="trivial-eventos.html" class="active">Events</a></li>
      <li id="dd-admin" style="display:none">
        <button onclick="toggleDropdown('dd-admin')">
          Admin <svg class="chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <ul class="navbar-dropdown">
          <li><a href="trivial-admin.html">📊 Admin Panel</a></li>
        </ul>
      </li>
    </ul>
    <div class="navbar-right" id="navbar-right"></div>
    <button class="navbar-burger" onclick="toggleMobile()">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
</nav>
<div class="navbar-mobile" id="navbar-mobile">
  <a href="trivial-modos.html">Home &amp; Network</a>
  <a href="trivial-ranking.html">Ranking</a>
  <a href="trivial-eventos.html">Events</a>
  <div class="mobile-divider"></div>
  <a href="trivial-admin.html" id="mobile-admin" style="display:none">Admin Panel</a>
</div>

<!-- HERO -->
<div class="eventos-hero">
  <div class="eventos-hero-inner">
    <span class="eventos-eyebrow">Trivial Travel</span>
    <h1>Events</h1>
    <p>Participa en los eventos especiales con preguntas exclusivas</p>
  </div>
</div>

<!-- FILTROS -->
<div class="eventos-filters">
  <div class="eventos-filters-inner">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Todos</button>
    <button class="filter-btn" data-filter="active" onclick="setFilter('active', this)">Activos</button>
    <button class="filter-btn" data-filter="upcoming" onclick="setFilter('upcoming', this)">Próximos</button>
    <button class="filter-btn" data-filter="finished" onclick="setFilter('finished', this)">Finalizados</button>
  </div>
</div>

<!-- LISTA DE EVENTOS -->
<div class="eventos-page">
  <div class="eventos-grid" id="eventos-grid">
    <div class="eventos-loading">
      <div class="dots"><span></span><span></span><span></span></div>
      Loading eventos...
    </div>
  </div>
</div>

<!-- MODAL DETALLE EVENTO -->
<div class="ev-modal-overlay" id="ev-modal">
  <div class="ev-modal">
    <button class="ev-modal-close" onclick="closeEventModal()">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="ev-modal-body" id="ev-modal-body"></div>
  </div>
</div>

<script src="js/utils.js"></script>
<script src="js/navbar.js"></script>
<script src="js/pages/eventos.js"></script>
</body>
</html>
