<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivial — Global Ranking</title>
<link rel="icon" type="image/png" href="images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/shared.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/pages/ranking.css">

</head>
<body>


<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-logo" href="trivial-intro.html">
      <img class="logo-main" src="images/logo.png" alt="Trivial Travel">
      <img class="logo-eu"   src="images/eu-logo.png"     alt="Co-funded by EU">
    </a>
    <ul class="navbar-links">
      <li><a href="trivial-modos.html">Play</a></li>
      <li><a href="trivial-ranking.html">Ranking</a></li>
      <li><a href="trivial-eventos.html">Events</a></li>
      <li id="dd-modos">
        <button onclick="toggleDropdown('dd-modos')">
          Modes
          <svg class="chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <ul class="navbar-dropdown">
          <li><a href="trivial-lobby.html">🌐 Play Online</a></li>
          <li><a href="trivial-ia-nivel.html">🤖 Play vs AI</a></li>
        </ul>
      </li>
      <li id="dd-admin" style="display:none">
        <button onclick="toggleDropdown('dd-admin')">
          Admin
          <svg class="chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <ul class="navbar-dropdown">
          <li><a href="trivial-admin.html">📊 Admin Panel</a></li>
        </ul>
      </li>
    </ul>
    <div class="navbar-right" id="navbar-right"></div>
    <button class="navbar-burger" onclick="toggleMobile()">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
</nav>
<div class="navbar-mobile" id="navbar-mobile">
  <a href="trivial-modos.html">Play</a>
  <a href="trivial-ranking.html">Ranking</a>
  <a href="trivial-eventos.html">Events</a>
  <a href="trivial-lobby.html" class="mobile-sub">🌐 Online</a>
  <a href="trivial-ia-nivel.html" class="mobile-sub">🤖 vs AI</a>
  <div class="mobile-divider"></div>
  <a href="trivial-login.html" id="mobile-login">Log in</a>
  <a href="trivial-admin.html" id="mobile-admin" style="display:none">Admin Panel</a>
</div>



<a class="btn-back" onclick="goBack()">
  <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  Back
</a>

<div class="page">

  <div class="header">
    <span class="header-label">Trivial Travel</span>
    <h1>🏆 Ranking<br>Global</h1>
    <p>The best players across all games</p>
  </div>

  <div class="podium" id="podium" style="display:none"></div>

  <div class="my-banner" id="my-banner">
    Your ranking position: <strong id="my-pos">—</strong>
  </div>

  <div class="ranking-wrap">
    <div class="table-header">
      <span style="text-align:center">#</span>
      <span>Player</span>
      <span style="text-align:center">🏆 Wins</span>
      <span style="text-align:center">⚡ Pts</span>
      <span style="text-align:center">🎮</span>
    </div>
    <div id="ranking-list">
      <div class="loading">
        <div class="dots"><span></span><span></span><span></span></div>
        Loading ranking...
      </div>
    </div>
  </div>

</div>

<script src="js/utils.js"></script>
<script src="js/navbar.js"></script>
<script src="js/pages/ranking.js"></script>
</body>
</html>
