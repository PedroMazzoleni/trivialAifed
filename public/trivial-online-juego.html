<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivial — Online</title>
<link rel="icon" type="image/png" href="images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/shared.css">
<link rel="stylesheet" href="css/pages/online-juego.css">
</head>
<body>

<!-- Mute button -->
<button class="mute-btn" id="mute-btn" onclick="toggleMute()" title="Silenciar">
  <svg id="mute-icon-on" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
  </svg>
  <svg id="mute-icon-off" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
    <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
  </svg>
</button>

<!-- ══════════ WAITING ══════════ -->
<div class="screen active" id="screen-waiting">
  <div class="wait-inner">
    <span class="wait-brand">Trivial — Online</span>
    <div class="wait-title" id="wait-title">Waiting room</div>
    <div class="wait-sub" id="wait-sub">Waiting for everyone to be ready...</div>
    <div class="wait-players" id="wait-players"></div>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>
</div>

<!-- ══════════ SPIN ══════════ -->
<div class="screen" id="screen-spin">

  <div class="spin-top">
    <div class="turn-banner">Turn of <strong id="turn-name">—</strong></div>
    <div class="round-badge" id="spin-round-badge">Round 1 / 6</div>
  </div>

  <div class="wheel-wrap">
    <canvas id="wheel-canvas" width="340" height="340"></canvas>
    <div class="wheel-pointer"></div>
  </div>

  <div class="cat-reveal" id="cat-reveal">
    <span class="cat-reveal-label">Category</span>
    <span class="cat-reveal-name" id="cat-reveal-name">—</span>
  </div>

  <div class="spin-controls" id="spin-controls">
    <button class="btn-main" id="btn-spin" onclick="spinWheel()">Spin wheel</button>
  </div>

  <div class="spin-waiting" id="spin-wait">
    <div class="dots"><span></span><span></span><span></span></div>
    <span id="spin-wait-text">Waiting...</span>
  </div>

  <div class="mini-scores" id="mini-scores"></div>
</div>

<!-- ══════════ QUESTION ══════════ -->
<div class="screen" id="screen-question">

  <div class="q-hud">
    <div class="q-hud-left">
      <span class="q-hud-counter" id="q-counter">Round 1/10</span>
      <span class="q-hud-cat" id="q-cat">—</span>
    </div>
    <div class="q-hud-right">
      <div class="q-timer-wrap">
        <div class="q-timer-bar"><div class="q-timer-fill" id="timer-fill"></div></div>
        <span class="q-timer-num" id="timer-num">15</span>
      </div>
      <span class="q-score-chip" id="my-score-hud">0 pts</span>
    </div>
  </div>

  <div class="question-panel">
    <div class="q-text" id="q-text">—</div>
    <div class="q-options" id="q-options"></div>
    <div class="q-feedback" id="q-feedback">
      <div>
        <span class="fb-title" id="fb-title">Correct</span>
        <span id="fb-detail"></span>
      </div>
      <button class="btn-next" id="btn-next" onclick="proceedNextTurn()">Next →</button>
    </div>
    <div class="q-waiting" id="q-waiting">
      <div class="dots"><span></span><span></span><span></span></div>
      <span id="q-waiting-text">Waiting for answer...</span>
    </div>
  </div>
</div>

<!-- ══════════ SCOREBOARD ══════════ -->
<div class="screen" id="screen-scoreboard">
  <div class="sb-wrap">

    <div class="sb-header">
      <span class="sb-label">Marcador</span>
      <div class="sb-round" id="sb-round">Round 1</div>
      <div class="sb-sub" id="sb-sub">Remaining 9 preguntas</div>
    </div>

    <div class="sb-answer-banner" id="sb-banner">
      <div class="sb-banner-icon" id="sb-icon">+</div>
      <div class="sb-banner-text">
        <span class="sb-banner-title" id="sb-banner-title">Correct</span>
        <span class="sb-banner-detail" id="sb-banner-detail">—</span>
      </div>
      <span class="sb-banner-pts" id="sb-banner-pts"></span>
    </div>

    <div class="sb-title-row">
      <span class="sb-col-label">Player</span>
      <span class="sb-col-label">Points</span>
    </div>

    <div class="sb-list" id="sb-list"></div>

    <div class="sb-countdown">
      <div class="sb-countdown-bar">
        <div class="sb-countdown-fill" id="sb-fill" style="width:100%"></div>
      </div>
      <div class="sb-countdown-text" id="sb-countdown-text">Next in 5s...</div>
      <button class="sb-btn-next" id="sb-btn-next" onclick="proceedNextTurn()">
        Continuar →
      </button>
    </div>

  </div>
</div>

<!-- ══════════ RESULTS ══════════ -->
<div class="screen" id="screen-results">
  <div class="results-inner">
    <div class="res-header">
      <span class="res-brand">Game over</span>
      <div class="res-title" id="res-title">Fin</div>
      <div class="res-msg" id="res-msg">—</div>
    </div>
    <div class="podium" id="podium"></div>
    <div class="res-btns">
      <button class="btn btn-primary" onclick="playAgain()">Play de nuevo</button>
      <button class="btn btn-ghost"   onclick="goHome()">Back al inicio</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/utils.js"></script>
<script src="js/pages/online-juego.js"></script>

<!-- ── CHAT PANEL ── -->
<div class="chat-panel collapsed" id="chat-panel">
  <div class="chat-header" onclick="toggleChat()">
    <span class="chat-title">💬 Chat</span>
    <span class="chat-unread" id="chat-unread" style="display:none">0</span>
    <button class="chat-toggle" id="chat-toggle-btn">▼</button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-wrap">
    <input type="text" id="chat-input" placeholder="Escribe un mensaje..." maxlength="100"
      onkeydown="if(event.key==='Enter') sendChat()">
    <button onclick="sendChat()">→</button>
  </div>
</div>

<style>
.chat-panel {
  position: fixed; bottom: 0; right: 20px;
  width: 290px; z-index: 200;
  background: #0d1535;
  border: 1px solid #1e2d50; border-bottom: none;
  border-radius: 10px 10px 0 0;
  display: flex; flex-direction: column;
  max-height: 400px;
  transition: transform .3s cubic-bezier(0.16,1,0.3,1);
}
.chat-panel.collapsed { transform: translateY(calc(100% - 44px)); }

.chat-header {
  display: flex; align-items: center; gap: 8px;
  padding: 11px 14px; cursor: pointer;
  border-bottom: 1px solid #1e2d50; flex-shrink: 0;
}
.chat-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 13px; letter-spacing: 1px; color: #e8eaf6;
  flex: 1;
}
.chat-unread {
  background: #e84545; color: #fff; border-radius: 50%;
  width: 18px; height: 18px; font-size: 10px; font-weight: 800;
  display: inline-flex; align-items: center; justify-content: center;
}
.chat-toggle {
  background: none; border: none; color: #8892b0;
  cursor: pointer; font-size: 12px;
  transition: transform .2s;
}
.chat-panel:not(.collapsed) .chat-toggle { transform: rotate(180deg); }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 10px 12px;
  display: flex; flex-direction: column; gap: 8px;
  min-height: 180px;
}
.chat-msg { display: flex; flex-direction: column; gap: 2px; }
.chat-msg-name {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #8892b0;
}
.chat-msg-name.me { color: #2d7dd2; }
.chat-msg-text {
  font-size: 13px; color: #e8eaf6;
  background: rgba(255,255,255,0.05);
  border-radius: 0 8px 8px 8px;
  padding: 6px 10px; max-width: 220px; word-break: break-word;
}
.chat-msg.is-me { align-items: flex-end; }
.chat-msg.is-me .chat-msg-text {
  background: rgba(45,125,210,0.2); border-radius: 8px 0 8px 8px;
}
.chat-msg.system .chat-msg-text {
  background: none; color: #8892b0; font-style: italic;
  font-size: 12px; border-radius: 0; padding: 2px 0;
}
.chat-input-wrap {
  display: flex; gap: 6px; padding: 8px 12px;
  border-top: 1px solid #1e2d50; flex-shrink: 0;
}
.chat-input-wrap input {
  flex: 1; background: rgba(255,255,255,0.05);
  border: 1px solid #1e2d50; border-radius: 4px;
  padding: 7px 10px; color: #e8eaf6; font-size: 13px; outline: none;
}
.chat-input-wrap input:focus { border-color: #2d7dd2; }
.chat-input-wrap button {
  background: #2d7dd2; border: none; border-radius: 4px;
  color: #fff; padding: 7px 12px; cursor: pointer; font-size: 14px;
}
@media (max-width: 480px) {
  .chat-panel { width: calc(100vw - 16px); right: 8px; }
}
</style>
</html>
